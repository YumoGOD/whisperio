services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      APP_ROLE: api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # GPU-воркер (по умолчанию). Требует NVIDIA Container Toolkit.
  # Запуск: docker compose up
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.worker
    env_file:
      - .env
    environment:
      APP_ROLE: worker
    gpus: all
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - api

  # CPU-воркер. Не требует GPU и NVIDIA-драйверов.
  # Запуск: docker compose --profile cpu up --scale worker=0
  worker-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    command: python -m app.worker
    env_file:
      - .env
    environment:
      APP_ROLE: worker
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - api
    profiles: [cpu]
