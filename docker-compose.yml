services:
  api:
    build: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Образ собран с CPU-torch; не смешивать с cuda из .env
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    volumes:
      - ./storage:/app/storage
    working_dir: /app/backend

  worker:
    build: .
    command: python -m app.worker
    env_file: .env
    environment:
      # Образ собран с CPU-torch; не смешивать с cuda из .env
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    volumes:
      - ./storage:/app/storage
    working_dir: /app/backend
# worker и api независимы; порядок запуска не важен
