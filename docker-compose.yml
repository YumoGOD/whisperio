services:
  backend:
    build:
      context: ./backend
    container_name: whisperio-backend
    ports:
      - "8000:8000"
    environment:
      # ==== Model / hardware ====
      # Accuracy-first профиль для CPU-only: large-v3 + int8.
      WHISPER_MODEL_SIZE: large-v3
      # Устройство: cpu (для вашего сервера без GPU).
      WHISPER_DEVICE: cpu
      # Тип вычислений: int8 ускоряет и снижает RAM, с небольшой потерей точности.
      WHISPER_COMPUTE_TYPE: int8
      # Потоки CTranslate2 на один worker-процесс.
      WHISPER_CPU_THREADS: "10"
      # Внутренние workers CTranslate2 внутри процесса (обычно 1 для CPU).
      WHISPER_MODEL_WORKERS: "1"

      # ==== Language / task ====
      # Фиксируем русский язык для лучшей точности (без автоопределения).
      WHISPER_LANGUAGE: ru
      WHISPER_TASK: transcribe

      # ==== Decode quality/speed ====
      # Beam/best_of: стартовый accuracy-first профиль в рамках SLA.
      WHISPER_BEAM_SIZE: 2
      WHISPER_BEST_OF: 1
      # Температура 0.0 даёт максимально детерминированный результат.
      WHISPER_TEMPERATURE: 0.0
      # Начальный промпт (если не нужен — пустая строка).
      WHISPER_INITIAL_PROMPT: ""
      # Учитывать предыдущий текст: обычно повышает связность, но немного снижает скорость.
      WHISPER_CONDITION_ON_PREVIOUS_TEXT: "false"

      # ==== VAD and segmentation ====
      # VAD отрезает неречевые участки до декодирования: ускоряет и уменьшает шум.
      WHISPER_VAD_FILTER: "true"
      # Порог VAD: выше = строже, может потерять тихую речь; ниже = больше фонового шума.
      WHISPER_VAD_THRESHOLD: "0.2"
      # Минимальная тишина для разрыва речи (мс): меньше = больше сегментов.
      WHISPER_VAD_MIN_SILENCE_DURATION_MS: "250"
      # Дополнительный запас вокруг речи (мс): выше = меньше обрезаний концов слов.
      WHISPER_VAD_SPEECH_PAD_MS: "700"
      # Пороги декодера: влияют на отбраковку низкокачественных сегментов.
      WHISPER_NO_SPEECH_THRESHOLD: "0.15"
      WHISPER_LOG_PROB_THRESHOLD: "-2.0"
      WHISPER_COMPRESSION_RATIO_THRESHOLD: "3.2"

      # ==== Tags: <Тишина> / <Музыка> / <Неразборчиво> ====
      # Минимальная пауза (сек) для тега <Тишина>.
      WHISPER_TAG_SILENCE_MIN_SEC: "5.0"
      # dBFS-порог тишины: ниже (например -42) = чаще <Тишина>; выше = реже.
      WHISPER_TAG_SILENCE_DBFS: "-38.0"
      # Минимальная длина интервала для классификации как музыка.
      WHISPER_TAG_MUSIC_MIN_SEC: "3.0"
      # Эвристики музыки: ослабление порогов => <Музыка> появляется чаще.
      WHISPER_TAG_MUSIC_MAX_ZCR: "0.08"
      WHISPER_TAG_MUSIC_MAX_ENERGY_VARIATION: "0.35"
      # Пороги для <Неразборчиво>: ужесточение => больше таких меток.
      WHISPER_TAG_UNINTELLIGIBLE_MAX_AVG_LOG_PROB: "-1.15"
      WHISPER_TAG_UNINTELLIGIBLE_MIN_NO_SPEECH_PROB: "0.55"
      WHISPER_TAG_UNINTELLIGIBLE_MAX_COMPRESSION_RATIO: "2.4"

      # ==== Quality guard ====
      # Повторный прогон при аномалиях (может улучшить качество, но увеличивает время).
      WHISPER_ENABLE_QUALITY_FALLBACK: "false"
      WHISPER_MIN_UNIQUE_SEGMENT_RATIO: "0.15"
      WHISPER_MAX_TOP_REPEAT_RATIO: "0.8"
      WHISPER_MAX_PROMPT_MATCH_RATIO: "0.5"

      # ==== Preprocess / runtime ====
      # Максимальный размер загружаемого исходного файла (МБ).
      MAX_UPLOAD_SIZE_MB: "3004"
      # Препроцессинг в mono/16kHz — стандарт для Whisper.
      WHISPER_PREPROCESS_SAMPLE_RATE: "16000"
      # Таймаут ffmpeg на подготовку.
      WHISPER_PREPROCESS_TIMEOUT_SEC: "1800"
      # Профиль улучшения аудио: off | balanced | aggressive.
      WHISPER_ENHANCE_PROFILE: balanced
      # Для дебага можно оставить prepared wav.
      WHISPER_KEEP_PREPARED_AUDIO: "true"
      # Длина чанка для поддерживаемых версий faster-whisper.
      WHISPER_CHUNK_LENGTH_S: "30"
      # Внешнее чанкирование для длинных файлов.
      WHISPER_LONG_AUDIO_MIN_SEC: "3600"
      WHISPER_LONG_AUDIO_CHUNK_SEC: "900"
      WHISPER_LONG_AUDIO_OVERLAP_SEC: "2.0"

      # ==== Parallelism ====
      # Количество отдельных worker-процессов с собственной моделью.
      WHISPER_WORKER_PROCESSES: "1"
      # Интервал опроса БД для диспетчера.
      WHISPER_DISPATCH_POLL_MS: "300"
      # Потоки math-библиотек (согласованы с WHISPER_CPU_THREADS).
      OMP_NUM_THREADS: "10"
      MKL_NUM_THREADS: "10"
      # Принудительная настройка потоков внутри subprocess-воркеров.
      WHISPER_PROCESS_OMP_THREADS: "10"
      WHISPER_PROCESS_MKL_THREADS: "10"
      # Таймаут конкурентного доступа к SQLite.
      SQLITE_BUSY_TIMEOUT_MS: "30000"
      # ==== Logging / observability ====
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      LOG_SERVICE_NAME: whisperio-backend
      LOG_FILE_ENABLED: "true"
      LOG_FILE_PATH: /app/data/logs/backend.jsonl
      LOG_FILE_MAX_BYTES: "52428800"
      LOG_FILE_BACKUP_COUNT: "5"
      LOG_SNAPSHOT_INTERVAL_SEC: "10"
      LOG_RESOURCE_RSS_WARN_MB: "12288"
      WHISPER_SLA_RTF_THRESHOLD: "0.25"

      # ==== Paths ====
      HF_HOME: /app/data/huggingface
      DATABASE_PATH: /app/data/app.db
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: whisperio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
