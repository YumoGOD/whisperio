services:
  backend:
    build:
      context: ./backend
    container_name: whisperio-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: whisperio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
