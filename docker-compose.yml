services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      APP_ROLE: api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  worker:
    build: .
    command: python -m app.worker
    env_file:
      - .env
    environment:
      APP_ROLE: worker
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - api
